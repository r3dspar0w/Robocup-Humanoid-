custom_motion_node:
  ros__parameters:
    robot:
      robot_name: ""
      custom_walk_cmd_topic: "/custom_walk_cmd"
      custom_walk_low_state_topic: "/low_state"
      custom_walk_low_cmd_topic: "/low_cmd"
      custom_walk_model_path: ""
      custom_walk_log_dir: "motion_control_logs"
      custom_walk_cmd_timeout_ms: 250.0
      custom_walk_loop_hz: 100.0
      custom_walk_gait_frequency: 1.5

start_pose_node:
  ros__parameters:
    robot:
      robot_name: ""
      start_pose_low_state_topic: "/low_state"
      start_pose_low_cmd_topic: "/low_cmd"
      start_pose_loop_hz: 100.0
      start_pose_transition_s: 3.0

actuator_monitor_node:
  ros__parameters:
    robot:
      robot_name: ""
      actuator_monitor_low_state_topic: "/low_state"
      actuator_monitor_console_period_s: 1.0
      actuator_monitor_print_all_joints: true
      actuator_monitor_csv_enabled: true
      actuator_monitor_csv_sample_every_n: 10
      actuator_monitor_csv_log_dir: "motion_control_logs"
      actuator_monitor_temp_warn_c: 80
